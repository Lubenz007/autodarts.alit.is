<form
  class="contact-form"
  id="contactForm"
  data-endpoint="{{ .Site.Params.contactApiUrl }}"
  novalidate
>
  {{/* Honeypot — hidden from real users, bots fill it in */}}
  <div style="display:none" aria-hidden="true">
    <input type="text" name="_honey" tabindex="-1" autocomplete="off">
  </div>

  <div class="form-group">
    <label for="name">Nafn</label>
    <input type="text" id="name" name="name" placeholder="Nafnið þitt" required>
  </div>

  <div class="form-group">
    <label for="email">Netfang</label>
    <input type="email" id="email" name="email" placeholder="netfang@dæmi.is" required>
  </div>

  <div class="form-group">
    <label for="product">Vara</label>
    <select id="product" name="product">
      <option value="">— Veldu vöru —</option>
      <option value="Eingöngu myndavélar">Eingöngu myndavélar</option>
      <option value="Myndavélafesting">Myndavélafesting</option>
      <option value="Myndavélafesting með LED hring">Myndavélafesting með LED hring</option>
      <option value="Myndavélafesting með LED hring og bakplötu">Myndavélafesting með LED hring og bakplötu</option>
      <option value="Annað">Annað / ekki viss</option>
    </select>
  </div>

  <div class="form-group">
    <label for="color">Litur</label>
    <input type="text" id="color" name="color" placeholder="t.d. svartur, hvítur, rauður...">
  </div>

  <div class="form-group">
    <label for="message">Skilaboð</label>
    <textarea id="message" name="message" rows="4" placeholder="Spurningar eða athugasemdir..."></textarea>
  </div>

  <div id="formStatus" class="form-status" role="alert" aria-live="polite"></div>

  <button type="submit" id="submitBtn">Óska eftir verði</button>
</form>

<style>
.contact-form {
  max-width: 480px;
  margin-top: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.form-group label {
  font-size: 0.9rem;
  font-weight: 600;
  opacity: 0.85;
}
.contact-form input,
.contact-form select,
.contact-form textarea {
  padding: 0.5rem 0.75rem;
  border: 1px solid rgba(128,128,128,0.3);
  border-radius: 6px;
  background: transparent;
  font-size: 0.95rem;
  width: 100%;
  box-sizing: border-box;
}
.contact-form input:focus,
.contact-form select:focus,
.contact-form textarea:focus {
  outline: 2px solid #0055FF;
  border-color: transparent;
}
.contact-form button[type="submit"] {
  padding: 0.6rem 1.5rem;
  background: #0055FF;
  color: white;
  border: none;
  border-radius: 6px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  align-self: flex-start;
  transition: background 0.2s;
}
.contact-form button[type="submit"]:hover { background: #0044cc; }
.contact-form button[type="submit"]:disabled { background: #888; cursor: not-allowed; }
.form-status {
  padding: 0.6rem 0.9rem;
  border-radius: 6px;
  font-size: 0.95rem;
  display: none;
}
.form-status.ok  { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
.form-status.err { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
</style>

<script>
(function () {
  var form    = document.getElementById('contactForm');
  var status  = document.getElementById('formStatus');
  var btn     = document.getElementById('submitBtn');
  var origTxt = btn.textContent;

  function showStatus(msg, isOk) {
    status.textContent = msg;
    status.className   = 'form-status ' + (isOk ? 'ok' : 'err');
    status.style.display = 'block';
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var endpoint = form.dataset.endpoint;
    if (!endpoint) { showStatus('Uppsetningarvilla: API endpoint vantar.', false); return; }

    btn.disabled    = true;
    btn.textContent = 'Sendi...';
    status.style.display = 'none';

    fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(new FormData(form)).toString()
    })
    .then(function (res) { return res.json(); })
    .then(function (data) {
      if (data.ok) {
        showStatus('Takk! Við munum hafa samband við þig fljótlega.', true);
        form.reset();
      } else {
        showStatus(data.error || 'Eitthvað fór úrskeiðis.', false);
      }
    })
    .catch(function () {
      showStatus('Nettengingarvilla. Reyndu aftur síðar.', false);
    })
    .finally(function () {
      btn.disabled    = false;
      btn.textContent = origTxt;
    });
  });
})();
</script>
